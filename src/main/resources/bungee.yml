name: BungeeAPI
version: '1.0.0.0'
main: net.boom3r.bungeeapi.BungeeAPI
author: BoOm3r
commands:
  hub:
    description: Send U to Hub
    permission: bungeeAPI.permission.hub
  servermanager:
    description: Permit to manage backend servers of BungeeCord
    permission: bungeeAPI.admin.servermanager
    aliases: [sm]
  maintenance:
    description: Permit to manage maintenance
    permission: bungeeAPI.admin.maintenance
  kick:
    description: Permit to kick
    permission: bungeeAPI.modo.kick
  group:
    description: Create a group
    permission: bungeeAPI.group